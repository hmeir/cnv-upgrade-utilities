name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: "\U0001F50D Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run tox -e lint

  test:
    name: "\U0001F9EA Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install Python versions
        run: uv python install 3.12 3.14
      - run: uv sync --extra dev
      - run: uv run tox -e py312,py314,coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: .coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  security:
    name: "\U0001F512 Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run tox -e security

  fbc:
    name: "\U0001F4E6 FBC Verification"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run tox -e fbc
