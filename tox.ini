[tox]
requires =
    tox-uv>=1.15
runner = uv-venv-lock-runner
envlist = lint, py312, py314, security, fbc, coverage

[testenv]
extras = dev
package = editable

[testenv:lint]
description = Run all linters
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/
    flake8 src/ tests/
    mypy

[testenv:py{312,314}]
description = Run unit tests with coverage
commands =
    pytest --cov=cnv_upgrade_utilities --cov=utils --cov-append \
        -m "not e2e and not fbc" {posargs}

[testenv:security]
description = Security scans
commands =
    bandit -r src/ -c pyproject.toml
    pip-audit

[testenv:fbc]
description = FBC ground truth verification (requires public internet for GitHub clone)
commands =
    pytest tests/e2e/ -m fbc -v -o "addopts=" {posargs}

[testenv:e2e]
description = End-to-end tests against Version Explorer API (requires RH network)
passenv = VERSION_EXPLORER_URL
commands =
    pytest tests/e2e/ -m e2e -v -o "addopts=" {posargs}

[testenv:coverage]
description = Combine coverage and enforce threshold
depends = py312, py314
skip_install = true
deps = coverage[toml]
commands =
    coverage combine
    coverage report --fail-under=80
    coverage html -d htmlcov
